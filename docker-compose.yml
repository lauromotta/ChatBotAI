version: '3.8'

services:
  # ────────────────────────────────────────────────
  # Evolution API — WhatsApp Gateway (open-source)
  # Dashboard: http://localhost:8080/manager
  # ────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:v2
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=sqlite
      - WEBHOOK_GLOBAL_URL=http://chatbot:8000/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
    volumes:
      - evolution_instances:/evolution/instances

  # ────────────────────────────────────────────────
  # ChatBotAI — Bot Python (FastAPI + Gemini)
  # API Docs: http://localhost:8000/docs
  # ────────────────────────────────────────────────
  chatbot:
    build: .
    container_name: chatbot
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      - evolution-api

volumes:
  evolution_instances:
